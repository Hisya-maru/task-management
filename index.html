<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Task management tool</title>
    </head>
<body>
    <header>Task Manager</header>

    <section id="input-area">
        <form id="task-form">
            <input type="text" id="taskText" placeholder="タスクを入力">    <!--task text column-->

            <select id="priority">      <!--pull down menue-->
                <option value="">--優先度--</option>
                <option value="S">S</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
            </select>       

            <button type="submit">追加</button>    <!--add task btn-->
        </form>
    </section>

    <div id="task-list">
        <p id="empty-message">タスクはありません。</p>    <!--empty task situation-->  
    </div>

    <script src="script.js"></script>
</body>
</html>
