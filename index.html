<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Task management tool</title>
    </head>

    <section class="task-input">
        <input type="text" id="taskText" placeholder="タスクを入力">   <!--task text column-->

        <select id="priority">    <!--pulldown menue-->
            <option value="">--選択--</option>
            <option value="high">S</option>
            <option value="medium">A</option>
            <option value="low">B</option>
            <option value="none">C</option>
        </select>

        <button id="addTaskBTN">追加</button>    <!--add task button-->
    </section>
</html>
